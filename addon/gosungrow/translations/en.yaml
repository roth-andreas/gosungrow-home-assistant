configuration:
  gosungrow_user:
    name: iSolarCloud username
  gosungrow_password:
    name: iSolarCloud password
  mqtt_host:
    name: MQTT host
    description: Optional custom MQTT broker host. Leave empty to use the Home Assistant MQTT service.
  mqtt_port:
    name: MQTT port
    description: MQTT broker port.
  mqtt_username:
