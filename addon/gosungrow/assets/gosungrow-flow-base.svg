<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">GoSungrow Power Flow</title>
  <desc id="desc">Solar, load, battery, and grid flow overview in a left-to-right layout.</desc>
  <defs>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#eef2f7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
  </defs>

  <rect x="18" y="18" width="1564" height="784" rx="44" fill="url(#panel)" />

  <g stroke-linecap="round" stroke="#d7dee8" stroke-width="18" fill="none">
    <line x1="352" y1="410" x2="678" y2="410" />
    <path d="M 342 360 C 520 270 728 220 1198 226" />
    <path d="M 342 460 C 520 550 728 600 1198 594" />
    <path d="M 862 364 C 980 306 1080 256 1198 228" />
    <path d="M 862 456 C 980 514 1080 564 1198 592" />
  </g>

  <g fill="#ffffff" filter="url(#shadow)">
    <circle cx="260" cy="410" r="94" />
    <circle cx="770" cy="410" r="94" />
    <circle cx="1290" cy="220" r="94" />
    <circle cx="1290" cy="600" r="94" />
  </g>

  <g fill="none" stroke-width="10">
    <circle cx="260" cy="410" r="94" stroke="#f59e0b" />
    <circle cx="770" cy="410" r="94" stroke="#2563eb" />
    <circle cx="1290" cy="220" r="94" stroke="#0f766e" />
    <circle cx="1290" cy="600" r="94" stroke="#475569" />
  </g>

  <g fill="#334155" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" text-anchor="middle">
    <text x="260" y="545" font-size="30" font-weight="700">SOLAR</text>
    <text x="770" y="545" font-size="30" font-weight="700">LOAD</text>
    <text x="1290" y="355" font-size="30" font-weight="700">BATTERY</text>
    <text x="1290" y="735" font-size="30" font-weight="700">GRID</text>
  </g>

  <g fill="#64748b" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" text-anchor="middle">
    <text x="510" y="342" font-size="18" font-weight="700">PV to Load</text>
    <text x="724" y="220" font-size="18" font-weight="700">PV to Battery</text>
    <text x="724" y="620" font-size="18" font-weight="700">PV to Grid</text>
    <text x="1010" y="286" font-size="18" font-weight="700">Battery to Load</text>
    <text x="1010" y="556" font-size="18" font-weight="700">Grid to Load</text>
  </g>
</svg>
