title: GoSungrow Flow
views:
  - title: System
    path: system
    icon: mdi:solar-power
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Live Flow
            icon: mdi:solar-power
          - type: custom:gosungrow-energy-flow-card-v2
            layout_options:
              grid_columns: full
              grid_rows: 5
            entities:
              solar_power: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_power
              load_power: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_load_power
              battery_power: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_power
              battery_soc: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13141
              grid_power: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_power
              pv_to_load_power: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_load_power
              pv_to_battery_power: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_battery_power
              pv_to_grid_power: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_grid_power
              battery_to_load_power: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_to_load_power
              grid_to_load_power: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_to_load_power

      - type: grid
        cards:
          - type: heading
            heading: Today
            icon: mdi:calendar-today
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13112
            name: PV Yield
            icon: mdi:solar-power
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13116
            name: PV To Load
            icon: mdi:home-lightning-bolt-outline
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13174
            name: PV To Battery
            icon: mdi:battery-charging-medium
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13173
            name: Feed-in
            icon: mdi:upload-network-outline
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13147
            name: Grid Import
            icon: mdi:download-network-outline
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13141
            name: Battery SOC
            icon: mdi:battery-medium

      - type: grid
        cards:
          - type: heading
            heading: Power Balance
            icon: mdi:chart-line
          - type: history-graph
            layout_options:
              grid_columns: full
              grid_rows: 5
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_power
                name: PV
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_load_power
                name: Load
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_power
                name: Grid
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_power
                name: Battery

      - type: grid
        cards:
          - type: heading
            heading: Flow Paths
            icon: mdi:transit-connection-variant
          - type: history-graph
            layout_options:
              grid_columns: full
              grid_rows: 5
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_load_power
                name: PV to Load
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_battery_power
                name: PV to Battery
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_grid_power
                name: PV to Grid
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_to_load_power
                name: Battery to Load
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_to_load_power
                name: Grid to Load

      - type: grid
        cards:
          - type: heading
            heading: Daily Energy
            icon: mdi:chart-areaspline
          - type: history-graph
            layout_options:
              grid_columns: full
              grid_rows: 5
            hours_to_show: 24
            refresh_interval: 300
            entities:
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13112
                name: PV Yield
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13116
                name: PV To Load
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13174
                name: PV To Battery
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13173
                name: Feed-in
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13147
                name: Grid Import
