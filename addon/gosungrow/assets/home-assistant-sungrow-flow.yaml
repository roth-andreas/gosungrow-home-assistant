title: GoSungrow Flow
views:
  - title: System
    path: system
    icon: mdi:solar-power
    badges: []
    cards:
      - type: vertical-stack
        cards:
          - type: picture-elements
            image: /local/gosungrow/gosungrow-flow-base.svg
            elements:
              - type: icon
                icon: mdi:solar-power-variant
                tap_action: none
                style:
                  top: 18%
                  left: 50%
                  color: "#d97706"
                  "--mdc-icon-size": 64px

              - type: state-label
                entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_power
                tap_action: none
                style:
                  top: 9%
                  left: 50%
                  color: white
                  background: "rgba(217, 119, 6, 0.95)"
                  border-radius: 999px
                  padding: 7px 14px
                  box-shadow: "0 10px 24px rgba(217, 119, 6, 0.28)"
                  transform: translate(-50%, -50%)
                  font-size: 17px
                  font-weight: 700

              - type: icon
                icon: mdi:home-lightning-bolt-outline
                tap_action: none
                style:
                  top: 50%
                  left: 50%
                  color: "#2563eb"
                  "--mdc-icon-size": 62px

              - type: state-label
                entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_load_power
                tap_action: none
                style:
                  top: 61%
                  left: 50%
                  color: white
                  background: "rgba(37, 99, 235, 0.95)"
                  border-radius: 999px
                  padding: 7px 14px
                  box-shadow: "0 10px 24px rgba(37, 99, 235, 0.28)"
                  transform: translate(-50%, -50%)
                  font-size: 17px
                  font-weight: 700

              - type: icon
                icon: mdi:battery-high
                tap_action: none
                style:
                  top: 79%
                  left: 18%
                  color: "#0f766e"
                  "--mdc-icon-size": 58px

              - type: state-label
                entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_power
                tap_action: none
                style:
                  top: 88%
                  left: 18%
                  color: white
                  background: "rgba(15, 118, 110, 0.95)"
                  border-radius: 999px
                  padding: 7px 14px
                  box-shadow: "0 10px 24px rgba(15, 118, 110, 0.24)"
                  transform: translate(-50%, -50%)
                  font-size: 17px
                  font-weight: 700

              - type: state-label
                entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13141
                tap_action: none
                style:
                  top: 95%
                  left: 18%
                  color: "#134e4a"
                  background: "rgba(204, 251, 241, 0.98)"
                  border-radius: 999px
                  padding: 5px 12px
