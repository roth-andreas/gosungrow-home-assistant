title: GoSungrow Flow
views:
  - title: System
    path: system
    icon: mdi:solar-power
    type: sidebar
    cards:
      - type: energy-date-selection
        view_layout:
          position: sidebar

      - type: grid
        title: Today At A Glance
        columns: 2
        square: false
        view_layout:
          position: sidebar
        cards:
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13112
            name: PV Yield
            icon: mdi:solar-power
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13116
            name: PV To Load
            icon: mdi:home-lightning-bolt-outline
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13174
            name: PV To Battery
            icon: mdi:battery-charging-medium
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13173
            name: Feed-in
            icon: mdi:upload-network-outline
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13147
            name: Grid Import
            icon: mdi:download-network-outline
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13141
            name: Battery SOC
            icon: mdi:battery-medium

      - type: energy-sources-table
        title: Energy Sources
        types:
          - grid
          - solar
          - battery
        view_layout:
          position: sidebar

      - type: energy-grid-neutrality-gauge
        view_layout:
          position: sidebar

      - type: energy-self-sufficiency-gauge
        view_layout:
          position: sidebar

      - type: energy-solar-consumed-gauge
        view_layout:
          position: sidebar

      - type: grid
        title: Route Power Now
        columns: 2
        square: false
        view_layout:
          position: sidebar
        cards:
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_load_power
            name: PV To Load
            icon: mdi:solar-power-variant-outline
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_battery_power
            name: PV To Battery
            icon: mdi:battery-charging-medium
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_grid_power
            name: PV To Grid
            icon: mdi:upload-network-outline
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_to_load_power
            name: Battery To Load
            icon: mdi:battery-arrow-down-outline
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_to_load_power
            name: Grid To Load
            icon: mdi:transmission-tower-export
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_power
            name: Grid Net
            icon: mdi:transmission-tower

      - type: power-sankey
        title: Power Flow Now
        layout: horizontal
        view_layout:
          position: main

      - type: energy-distribution
        title: Energy Distribution
        view_layout:
          position: main

      - type: horizontal-stack
        view_layout:
          position: main
        cards:
          - type: power-sources-graph
            title: Power Sources
          - type: energy-usage-graph
            title: Energy Usage

      - type: horizontal-stack
        view_layout:
          position: main
        cards:
          - type: energy-solar-graph
            title: Solar Production
          - type: history-graph
            title: Battery Level Today
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13141
                name: Battery SOC

      - type: history-graph
        title: Route Detail Today
        view_layout:
          position: main
        hours_to_show: 24
        refresh_interval: 60
        entities:
          - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_load_power
            name: PV to Load
          - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_battery_power
            name: PV to Battery
          - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_grid_power
            name: PV to Grid
          - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_to_load_power
            name: Battery to Load
          - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_to_load_power
            name: Grid to Load
