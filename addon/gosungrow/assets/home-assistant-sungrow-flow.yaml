title: GoSungrow Flow
views:
  - title: System
    path: system
    icon: mdi:solar-power
    type: sidebar
    cards:
      - type: picture-elements
        image: /local/gosungrow/gosungrow-flow-base.svg
        view_layout:
          position: main
        elements:
          - type: icon
            icon: mdi:solar-power-variant
            tap_action: none
            style:
              top: 50%
              left: 14.38%
              color: "#d97706"
              "--mdc-icon-size": 60px

          - type: icon
            icon: mdi:home-lightning-bolt-outline
            tap_action: none
            style:
              top: 50%
              left: 43.75%
              color: "#2563eb"
              "--mdc-icon-size": 58px

          - type: icon
            icon: mdi:battery-high
            tap_action: none
            style:
              top: 29.41%
              left: 76.88%
              color: "#0f766e"
              "--mdc-icon-size": 54px

          - type: icon
            icon: mdi:transmission-tower
            tap_action: none
            style:
              top: 70.59%
              left: 76.88%
              color: "#475569"
              "--mdc-icon-size": 54px

          - type: state-label
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_power
            tap_action: none
            style:
              top: 23.53%
              left: 14.38%
              color: white
              background: "rgba(217, 119, 6, 0.96)"
              border: "1px solid rgba(180, 83, 9, 0.22)"
              border-radius: 16px
              padding: 7px 12px
              box-shadow: "0 6px 14px rgba(217, 119, 6, 0.14)"
              transform: translate(-50%, -50%)
              font-size: 15px
              font-weight: 700

          - type: state-label
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_load_power
            tap_action: none
            style:
              top: 23.53%
              left: 43.75%
              color: white
              background: "rgba(37, 99, 235, 0.96)"
              border: "1px solid rgba(29, 78, 216, 0.22)"
              border-radius: 16px
              padding: 7px 12px
              box-shadow: "0 6px 14px rgba(37, 99, 235, 0.14)"
              transform: translate(-50%, -50%)
              font-size: 15px
              font-weight: 700

          - type: state-label
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_power
            tap_action: none
            style:
              top: 10.29%
              left: 76.88%
              color: white
              background: "rgba(15, 118, 110, 0.96)"
              border: "1px solid rgba(13, 148, 136, 0.20)"
              border-radius: 16px
              padding: 7px 12px
              box-shadow: "0 6px 14px rgba(15, 118, 110, 0.12)"
              transform: translate(-50%, -50%)
              font-size: 15px
              font-weight: 700

          - type: state-label
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13141
            tap_action: none
            style:
              top: 40.59%
              left: 76.88%
              color: "#134e4a"
              background: "rgba(204, 251, 241, 0.98)"
              border: "1px solid rgba(15, 118, 110, 0.22)"
              border-radius: 16px
              padding: 4px 10px
              transform: translate(-50%, -50%)
              font-size: 12px
              font-weight: 700

          - type: state-label
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_power
            tap_action: none
            style:
              top: 89.71%
              left: 76.88%
              color: white
              background: "rgba(71, 85, 105, 0.96)"
              border: "1px solid rgba(51, 65, 85, 0.22)"
              border-radius: 16px
              padding: 7px 12px
              box-shadow: "0 6px 14px rgba(71, 85, 105, 0.12)"
              transform: translate(-50%, -50%)
              font-size: 15px
              font-weight: 700

          - type: state-label
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_load_power
            tap_action: none
            style:
              top: 42.65%
              left: 28.75%
              color: "#7c2d12"
              background: "rgba(255, 237, 213, 0.98)"
              border: "1px solid rgba(217, 119, 6, 0.18)"
              border-radius: 14px
              padding: 4px 8px
              transform: translate(-50%, -50%)
              font-size: 11px
              font-weight: 700

          - type: state-label
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_battery_power
            tap_action: none
            style:
              top: 28.68%
              left: 47.5%
              color: "#7c2d12"
              background: "rgba(255, 237, 213, 0.98)"
              border: "1px solid rgba(217, 119, 6, 0.18)"
              border-radius: 14px
              padding: 4px 8px
              transform: translate(-50%, -50%)
              font-size: 11px
              font-weight: 700

          - type: state-label
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_grid_power
            tap_action: none
            style:
              top: 56.62%
              left: 47.5%
              color: "#7c2d12"
              background: "rgba(255, 237, 213, 0.98)"
              border: "1px solid rgba(217, 119, 6, 0.18)"
              border-radius: 14px
              padding: 4px 8px
              transform: translate(-50%, -50%)
              font-size: 11px
              font-weight: 700

          - type: state-label
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_to_load_power
            tap_action: none
            style:
              top: 35.29%
              left: 63.75%
              color: "#134e4a"
              background: "rgba(204, 251, 241, 0.98)"
              border: "1px solid rgba(15, 118, 110, 0.18)"
              border-radius: 14px
              padding: 4px 8px
              transform: translate(-50%, -50%)
              font-size: 11px
              font-weight: 700

          - type: state-label
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_to_load_power
            tap_action: none
            style:
              top: 64.71%
              left: 63.75%
              color: "#334155"
              background: "rgba(226, 232, 240, 0.98)"
              border: "1px solid rgba(71, 85, 105, 0.18)"
              border-radius: 14px
              padding: 4px 8px
              transform: translate(-50%, -50%)
              font-size: 11px
              font-weight: 700

      - type: grid
        title: Today At A Glance
        columns: 2
        square: false
        view_layout:
          position: sidebar
        cards:
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13112
            name: PV Yield
            icon: mdi:solar-power
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13116
            name: PV To Load
            icon: mdi:home-lightning-bolt-outline
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13174
            name: PV To Battery
            icon: mdi:battery-charging-medium
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13173
            name: Feed-in
            icon: mdi:upload-network-outline
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13147
            name: Grid Import
            icon: mdi:download-network-outline
          - type: tile
            entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13141
            name: Battery SOC
            icon: mdi:battery-medium

      - type: history-graph
        title: Energy Through Today
        hours_to_show: 24
        refresh_interval: 300
        view_layout:
          position: sidebar
        entities:
          - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13112
            name: PV Yield
          - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13116
            name: PV To Load
          - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13174
            name: PV To Battery
          - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13173
            name: Feed-in
          - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13147
            name: Grid Import

      - type: history-graph
        title: Battery Level Today
        hours_to_show: 24
        refresh_interval: 120
        view_layout:
          position: sidebar
        entities:
          - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13141
            name: Battery SOC

      - type: horizontal-stack
        view_layout:
          position: main
        cards:
          - type: history-graph
            title: Power Balance Today
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_power
                name: PV
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_load_power
                name: Load
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_power
                name: Grid
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_power
                name: Battery

          - type: history-graph
            title: Route Detail Today
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_load_power
                name: PV to Load
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_battery_power
                name: PV to Battery
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_grid_power
                name: PV to Grid
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_to_load_power
                name: Battery to Load
              - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_to_load_power
                name: Grid to Load
