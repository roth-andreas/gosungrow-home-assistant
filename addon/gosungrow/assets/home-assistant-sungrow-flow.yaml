            buckets:
              day: 14
              month: 12
              year: 5
            labels:
              title: Energy Summary
              period_day: Day
              period_month: Month
              period_year: Year
              unavailable: Unavailable
              statistics_unavailable: Statistics unavailable
              no_statistics: No statistics yet
              name_production: Production
              name_consumption: Consumption
              name_to_grid: To Grid
              name_from_grid: From Grid
              name_to_battery: To Battery
              name_from_battery: From Battery
            entities:
              production: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13112
              consumption: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13199
              to_grid: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13173
              from_grid: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13147
              to_battery: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13174
              from_battery: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13029

