# Custom Sungrow flow card
#
# Before using this:
# 1. Copy docs/SungrowEnergy2*.png to Home Assistant /config/www/
# 2. Replace YOUR_ESS_PS_KEY with your ESS device key
#
# Example ESS key: 5072099_14_1_1

type: vertical-stack
cards:
  - type: picture-elements
    image: /local/SungrowEnergy2.png
    elements:
      - type: image
        entity: binary_sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_power_active
        tap_action: none
        state_image:
          "off": /local/SungrowEnergy2-GridOff.png
        state_filter:
          "off": opacity(100%)
          "on": opacity(0%)
        style:
          top: 50%
          left: 50%
          width: 100%

      - type: image
        entity: binary_sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_power_active
        tap_action: none
        state_image:
          "off": /local/SungrowEnergy2-BatteryOff.png
        state_filter:
          "off": opacity(100%)
          "on": opacity(0%)
        style:
          top: 50%
          left: 50%
          width: 100%

      - type: image
        entity: binary_sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_load_power_active
        tap_action: none
        state_image:
          "off": /local/SungrowEnergy2-LoadOff.png
        state_filter:
          "off": opacity(100%)
          "on": opacity(0%)
        style:
          top: 50%
          left: 50%
          width: 100%

      - type: image
        entity: binary_sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_power_active
        tap_action: none
        state_image:
          "off": /local/SungrowEnergy2-PVOff.png
        state_filter:
          "off": opacity(100%)
          "on": opacity(0%)
        style:
          top: 50%
          left: 50%
          width: 100%

      - type: image
        entity: binary_sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_battery_power_active
        tap_action: none
        state_image:
          "on": /local/SungrowEnergy2-PVToBattery.png
        state_filter:
          "on": opacity(100%)
          "off": opacity(0%)
        style:
          top: 50%
          left: 50%
          width: 100%

      - type: image
        entity: binary_sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_load_power_active
        tap_action: none
        state_image:
          "on": /local/SungrowEnergy2-PVToLoad.png
        state_filter:
          "on": opacity(100%)
          "off": opacity(0%)
        style:
          top: 50%
          left: 50%
          width: 100%

      - type: image
        entity: binary_sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_to_grid_power_active
        tap_action: none
        state_image:
          "on": /local/SungrowEnergy2-PVToGrid.png
        state_filter:
          "on": opacity(100%)
          "off": opacity(0%)
        style:
          top: 50%
          left: 50%
          width: 100%

      - type: image
        entity: binary_sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_to_load_power_active
        tap_action: none
        state_image:
          "on": /local/SungrowEnergy2-BatteryToLoad.png
        state_filter:
          "on": opacity(100%)
          "off": opacity(0%)
        style:
          top: 50%
          left: 50%
          width: 100%

      - type: image
        entity: binary_sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_grid_to_load_power_active
        tap_action: none
        state_image:
          "on": /local/SungrowEnergy2-GridToLoad.png
        state_filter:
          "on": opacity(100%)
          "off": opacity(0%)
        style:
          top: 50%
          left: 50%
          width: 100%

      - type: state-label
        entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_pv_power
        style:
          background-color: rgba(0, 102, 204, 0.9)
          color: white
          top: 4%
          left: 50%

      - type: state-label
        entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_battery_power
        style:
          background-color: rgba(0, 102, 204, 0.9)
          color: white
          top: 85%
          left: 16%

      - type: state-label
        entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13149
        style:
          background-color: rgba(0, 102, 204, 0.9)
          color: white
          top: 85%
          left: 85%

      - type: state-label
        entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13119
        style:
          background-color: rgba(0, 102, 204, 0.9)
          color: white
          top: 65%
          left: 50%

  - type: entities
    title: Sungrow Daily Breakdown
    entities:
      - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13112
        name: Daily PV Yield
      - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13116
        name: Daily PV Used By Loads
      - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13174
        name: Daily PV To Battery
      - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13173
        name: Daily Feed-in (PV)
      - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13147
        name: Daily Grid Import
      - entity: sensor.gosungrow_virtual_YOUR_ESS_PS_KEY_p13141
        name: Battery SOC
