name: homeassistant-addon

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - ".github/workflows/homeassistant-addon.yml"
      - ".dockerignore"
      - "addon/gosungrow/**"
      - "cmd/**"
      - "cmdHassio/**"
      - "cmdModbus/**"
      - "defaults/**"
      - "iSolarCloud/**"
      - "tablib/**"
      - "go.mod"
      - "go.sum"
      - "main.go"
  pull_request:
    paths:
      - ".github/workflows/homeassistant-addon.yml"
      - ".dockerignore"
      - "addon/gosungrow/**"
      - "cmd/**"
      - "cmdHassio/**"
      - "cmdModbus/**"
      - "defaults/**"
      - "iSolarCloud/**"
      - "tablib/**"
      - "go.mod"
      - "go.sum"
      - "main.go"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate version alignment
        shell: bash
        run: |
          addon_version="$(awk '/^version:/{print $2}' addon/gosungrow/config.yaml)"
          app_version="$(awk -F'\"' '/BinaryVersion = /{print $2}' defaults/const.go)"
          case "$addon_version" in
            "$app_version"*) ;;
            *)
              echo "Add-on version $addon_version must start with binary version $app_version"
              exit 1
              ;;
          esac

      - name: Build Go binary
        env:
          CGO_ENABLED: 0
        run: |
          go mod download
          go build .

      - name: Build add-on image (amd64 smoke test)
        run: |
          docker build \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:latest \
            --build-arg BUILD_ARCH=amd64 \
            --build-arg BUILD_VERSION=test \
            -f addon/gosungrow/Dockerfile \
            .

  publish:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:latest
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base:latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read add-on version
        id: version
        shell: bash
        run: echo "value=$(awk '/^version:/{print $2}' addon/gosungrow/config.yaml)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: addon/gosungrow/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.version.outputs.value }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/gosungrow-addon-${{ matrix.arch }}:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/gosungrow-addon-${{ matrix.arch }}:latest
